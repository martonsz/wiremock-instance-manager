<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WireMock Server Manager</title>
<style>
  body { font-family: sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; }
  h1 { color: #333; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { text-align: left; padding: 10px; border-bottom: 1px solid #ddd; }
  th { background: #f4f4f4; }
  tr:hover { background: #fafafa; }
  .btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
  .btn-primary { background: #007bff; color: #fff; }
  .btn-success { background: #28a745; color: #fff; }
  .btn-danger { background: #dc3545; color: #fff; }
  #create-form { display:none; background:#f9f9f9; border:1px solid #ddd; padding:20px; border-radius:6px; margin-top:20px; }
  #create-form label { display:block; margin-top:10px; font-weight:bold; }
  #create-form input { width:100%; padding:6px; box-sizing:border-box; margin-top:4px; }
  #toast-container { position:fixed; bottom:20px; right:20px; z-index:9999; }
  .toast { padding:10px 18px; margin-top:8px; border-radius:4px; color:#fff; font-size:0.9em; }
  .toast-success { background:#28a745; }
  .toast-error { background:#dc3545; }
  a { color: #007bff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  footer { margin-top: 40px; text-align: center; font-size: 0.8em; color: #aaa; }
</style>
</head>
<body>
<h1>WireMock Server Manager</h1>
<button class="btn btn-primary" onclick="toggleCreateForm()">+ Create New Instance</button>

<div id="create-form">
  <h3>New Instance</h3>
  <label>Name <input id="new-name" type="text" placeholder="My WireMock"/></label>
  <label>Port <input id="new-port" type="number" placeholder="9090" min="1024" max="65535"/></label>
  <div style="margin-top:16px;">
    <button class="btn btn-success" onclick="createInstance()">Create</button>
    <button class="btn" onclick="toggleCreateForm()" style="margin-left:8px;">Cancel</button>
  </div>
</div>

<table id="instances-table">
  <thead><tr><th>Name</th><th>Port</th><th>Status</th><th>Actions</th></tr></thead>
  <tbody id="instances-body"><tr><td colspan="4">Loading...</td></tr></tbody>
</table>

<script src="/js/app.js"></script>
<script>
let refreshInterval;

async function loadInstances() {
  try {
    const instances = await fetchJson('/api/instances');
    const tbody = document.getElementById('instances-body');
    if (instances.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4">No instances yet.</td></tr>';
      return;
    }
    tbody.innerHTML = instances.map(i => `
      <tr>
        <td><a href="/instance.html?id=${i.id}">${escHtml(i.name)}</a></td>
        <td>${i.port}</td>
        <td>${statusBadge(i.status)}</td>
        <td>
          ${i.status === 'STOPPED'
            ? `<button class="btn btn-success" onclick="doAction('${i.id}','start')">Start</button>`
            : `<button class="btn" onclick="doAction('${i.id}','stop')">Stop</button>`}
          <button class="btn btn-danger" onclick="doDelete('${i.id}')" style="margin-left:6px;">Delete</button>
        </td>
      </tr>`).join('');
  } catch (e) {
    showToast('Failed to load instances: ' + e.message, 'error');
  }
}

async function doAction(id, action) {
  try {
    await fetchJson(`/api/instances/${id}/${action}`, { method: 'POST' });
    const actionPastTense = action === 'start' ? 'started' : `${action}ped`;
    showToast(`Instance ${actionPastTense}`);
    loadInstances();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

async function doDelete(id) {
  if (!confirm('Delete this instance?')) return;
  try {
    await fetchJson(`/api/instances/${id}`, { method: 'DELETE' });
    showToast('Instance deleted');
    loadInstances();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

async function toggleCreateForm() {
  const f = document.getElementById('create-form');
  const opening = f.style.display === 'none';
  f.style.display = opening ? 'block' : 'none';
  if (opening) {
    try {
      const { port } = await fetchJson('/api/instances/next-port');
      document.getElementById('new-port').value = port;
    } catch (e) {
      // leave blank if fetch fails
    }
  }
}

async function createInstance() {
  const name = document.getElementById('new-name').value.trim();
  const port = parseInt(document.getElementById('new-port').value);
  if (!name || !port) { showToast('Name and port are required', 'error'); return; }
  try {
    await fetchJson('/api/instances', {
      method: 'POST',
      body: JSON.stringify({ name, port, options: [] })
    });
    showToast('Instance created');
    toggleCreateForm();
    document.getElementById('new-name').value = '';
    document.getElementById('new-port').value = '';
    loadInstances();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadInstances();
refreshInterval = setInterval(loadInstances, 5000);
fetchJson('/api/instances/version').then(d => {
  document.getElementById('app-footer').textContent = 'v' + d.version;
}).catch(() => {});
</script>
<footer id="app-footer"></footer>
</body>
</html>
