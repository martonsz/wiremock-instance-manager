name: CI / Release

on:
  push:
  workflow_dispatch:
    inputs:
      build_image:
        description: "Build and release Docker image"
        type: boolean
        default: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build, test, and verify coverage
        run: ./gradlew test jacocoTestCoverageVerification bootJar

      - name: Upload boot jar
        uses: actions/upload-artifact@v4
        with:
          name: boot-jar
          path: build/libs/*.jar
          retention-days: 1

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/
          retention-days: 14

  release:
    if: github.event_name == 'workflow_dispatch' && inputs.build_image
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from gradle.properties
        id: version
        run: |
          VERSION=$(grep '^appVersion=' gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=release/$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git tag -l "$TAG" | grep -q .; then
            echo "ERROR: Tag '$TAG' already exists. Bump appVersion in gradle.properties before releasing."
            exit 1
          fi

      - name: Download boot jar
        uses: actions/download-artifact@v4
        with:
          name: boot-jar
          path: build/libs/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/wiremock-instance-manager"
          docker build -f Dockerfile.ci -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"

      - name: Create and push git tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: boot-jar/*.jar
